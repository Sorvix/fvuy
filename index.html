<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  .gallery { width: 100%; height: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; -webkit-overflow-scrolling: touch; }
  .gallery::-webkit-scrollbar { display: none; }
  .gallery { scrollbar-width: none; }
  .slide { width: 100%; min-height: 100%; scroll-snap-align: start; scroll-snap-stop: always; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .slide img { width: 100%; height: 100%; object-fit: contain; display: block; }
</style>
</head>
<body>
<div class="gallery">
  <div class="slide"><img src="9HnK.jpg" alt=""></div>
  <div class="slide"><img src="KWSzH.jpg" alt=""></div>
</div>
</body>
</html>
